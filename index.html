<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MzansiVerse Hub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Welcome to MzansiVerse</h1>
    <p>The Future is Now — South Africa First</p>
  </header>

  <section id="apps">
    <h2>Applications</h2>
    <div class="grid">
      <div class="card">
        <img src="assets/images/app-placeholder.png" alt="App 1">
        <h3>Mzansi Timer Lite</h3>
        <a href="apps/app1.apk" class="download">Download</a>
      </div>
      <div class="card">
        <img src="assets/images/app-placeholder.png" alt="App 2">
        <h3>Mzansi Calculator Lite</h3>
        <a href="apps/app2.apk" class="download">Download</a>
      </div>
    </div>
  </section>

  <section id="games">
    <h2>Games</h2>
    <div class="grid">
      <div class="card">
        <img src="assets/images/game-placeholder.png" alt="Game 1">
        <h3>Mzansi Bounce 2D</h3>
        <a href="games/game1.apk" class="download">Download</a>
      </div>
      <div class="card">
        <img src="assets/images/game-placeholder.png" alt="Game 2">
        <h3>Mzansi Snake 2D</h3>
        <a href="games/game2.apk" class="download">Download</a>
      </div>
    </div>
  </section>

  <section id="service-providers">
    <h2>Join MzansiVerse</h2>
    <form id="providerForm">
      <input type="text" name="name" placeholder="Full Name" required>
      <input type="email" name="email" placeholder="Email Address" required>
      <input type="text" name="service" placeholder="Service Provided" required>
      <button type="submit">Join Now</button>
    </form>
  </section>

  <script src="js/main.js"></script>
</body>
</html>
